<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Platform</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 16 20 6-6-20A20 20 0 0 0 2 16"/><path d="M5.71 17.11a17.04 17.04 0 0 1 11.4-11.4"/></svg>
            CraveDelivery
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item active">Restaurants</a>
            <a href="history.html" class="nav-item">History</a>
            <a href="tracking.html" class="nav-item">Tracking</a>
            <a href="cart.html" class="nav-cart-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Cart (<span id="cart-count">0</span>)
            </a>
        </nav>
    </header>

    <main class="container">
        <h1 class="section-title">Discover Restaurants</h1>
        
        <div class="search-filter-section">
            <div class="search-bar">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" placeholder="Search for food, restaurants...">
            </div>
            <div class="filters" id="categoryFilters">
                <button class="filter-btn active" data-category="All">All</button>
                <button class="filter-btn" data-category="Desi">Desi</button>
                <button class="filter-btn" data-category="BBQ">BBQ</button>
                <button class="filter-btn" data-category="Desserts">Desserts</button>
                <button class="filter-btn" data-category="Rice">Rice</button>
            </div>
        </div>

        <div class="restaurant-grid" id="restaurantGrid">
        </div>
    </main>

    <div class="modal-overlay" id="restaurantModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn">&times;</button>
            <div class="modal-header-img">
                <img src="images/1.jpeg" alt="Restaurant Cover" id="modalRestaurantImg">
            </div>
            <div class="modal-body">
                <h2 class="modal-restaurant-title" id="modalRestaurantName">Restaurant Name</h2>
                <div class="restaurant-meta">
                    <span id="modalRestaurantRating">⭐ 4.5 (120+ ratings)</span>
                    <span id="modalRestaurantDelivery">30-40 min • Free Delivery</span>
                </div>
                
                <div class="menu-section">
                    <h3>Menu</h3>
                    <div class="menu-grid" id="menuGrid">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="scripts/app.js"></script>
</body>
</html>
