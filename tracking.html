<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking - Food Delivery Platform</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/tracking.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 16 20 6-6-20A20 20 0 0 0 2 16"/><path d="M5.71 17.11a17.04 17.04 0 0 1 11.4-11.4"/></svg>
            CraveDelivery
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Restaurants</a>
            <a href="history.html" class="nav-item">History</a>
            <a href="tracking.html" class="nav-item active">Tracking</a>
            <a href="cart.html" class="nav-cart-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Cart (<span id="cart-count">0</span>)
            </a>
        </nav>
    </header>

    <main class="container">
        <div class="tracking-container" id="trackingContent">
            <!-- Populated by JS if there's an active order -->
            <div class="empty-state" id="noActiveOrder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <h2>No Active Orders</h2>
                <p>You don't have any orders currently being prepared or delivered.</p>
                <br>
                <a href="index.html" class="nav-cart-btn" style="display:inline-flex;">Order Now</a>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="scripts/app.js"></script>
</body>
</html>
