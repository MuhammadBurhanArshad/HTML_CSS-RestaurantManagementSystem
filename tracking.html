<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking - Food Delivery Platform</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/tracking.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="icons/brand.svg" width="24" height="24" alt="Brand">
            CraveDelivery
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Restaurants</a>
            <a href="history.html" class="nav-item">History</a>
            <a href="tracking.html" class="nav-item active">Tracking</a>
            <a href="cart.html" class="nav-cart-btn">
                <img src="icons/cart.svg" width="18" height="18" alt="Cart">
                Cart (<span id="cart-count">0</span>)
            </a>
        </nav>
    </header>

    <main class="container">
        <div class="tracking-container" id="trackingContent">
            <!-- Populated by JS if there's an active order -->
            <div class="empty-state" id="noActiveOrder">
                <img src="icons/no-order.svg" width="64" height="64" alt="No Active Order">
                <h2>No Active Orders</h2>
                <p>You don't have any orders currently being prepared or delivered.</p>
                <br>
                <a href="index.html" class="nav-cart-btn" style="display:inline-flex;">Order Now</a>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="scripts/app.js"></script>
</body>
</html>
