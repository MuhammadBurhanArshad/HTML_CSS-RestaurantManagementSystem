<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Food Delivery Platform</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/cart.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Shared Navigation -->
    <header class="navbar">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 16 20 6-6-20A20 20 0 0 0 2 16"/><path d="M5.71 17.11a17.04 17.04 0 0 1 11.4-11.4"/></svg>
            CraveDelivery
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Restaurants</a>
            <a href="history.html" class="nav-item">History</a>
            <a href="tracking.html" class="nav-item">Tracking</a>
            <a href="cart.html" class="nav-cart-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Cart (<span id="cart-count">0</span>)
            </a>
        </nav>
    </header>

    <main class="container">
        <h1 class="section-title">Your Cart</h1>
        
        <div class="cart-container" id="cartContainer">
            <div class="cart-items" id="cartItemsList">
                
            </div>
            
            <div class="cart-summary" id="cartSummarySection">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotalAmount">Rs. 0</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span id="deliveryFee">Rs. 150</span>
                </div>
                <div class="summary-row">
                    <span>Tax (8%)</span>
                    <span id="taxAmount">Rs. 0</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="totalAmount">Rs. 0</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="scripts/app.js"></script>
</body>
</html>
