<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Food Delivery Platform</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/cart.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="icons/brand.svg" width="24" height="24" alt="Brand">
            CraveDelivery
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Restaurants</a>
            <a href="history.html" class="nav-item">History</a>
            <a href="tracking.html" class="nav-item">Tracking</a>
            <a href="cart.html" class="nav-cart-btn">
                <img src="icons/cart.svg" width="18" height="18" alt="Cart">
                Cart (<span id="cart-count">0</span>)
            </a>
        </nav>
    </header>

    <main class="container">
        <h1 class="section-title">Your Cart</h1>
        
        <div class="cart-container" id="cartContainer">
            <div class="cart-items" id="cartItemsList">
                
            </div>
            
            <div class="cart-summary" id="cartSummarySection">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotalAmount">Rs. 0</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span id="deliveryFee">Rs. 150</span>
                </div>
                <div class="summary-row">
                    <span>Tax (8%)</span>
                    <span id="taxAmount">Rs. 0</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="totalAmount">Rs. 0</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="scripts/app.js"></script>
</body>
</html>
